    // ── Hook : typing animation ───────────────────────────────────────────────────
    function useTyping(roles) {
      const [displayed, setDisplayed] = useState('');
      const [roleIdx, setRoleIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);

      useEffect(() => {
        const current = roles[roleIdx];
        let delay;
        if (!deleting) {
          if (displayed.length < current.length) {
            delay = 90;
            const t = setTimeout(() => setDisplayed(current.slice(0, displayed.length + 1)), delay);
            return () => clearTimeout(t);
          } else {
            delay = 2200;
            const t = setTimeout(() => setDeleting(true), delay);
            return () => clearTimeout(t);
          }
        } else {
          if (displayed.length > 0) {
            delay = 45;
            const t = setTimeout(() => setDisplayed(displayed.slice(0, -1)), delay);
            return () => clearTimeout(t);
          } else {
            setDeleting(false);
            setRoleIdx((i) => (i + 1) % roles.length);
          }
        }
      }, [displayed, deleting, roleIdx, roles]);

      return displayed;
    }

    // ── Hook : smart navbar (hide/show on scroll) ─────────────────────────────────
    function useSmartNav() {
      const [scrolled, setScrolled] = useState(false);
      const [hidden, setHidden] = useState(false);
      const lastY = useRef(0);

      useEffect(() => {
        let ticking = false;
        const handler = () => {
          if (!ticking) {
            requestAnimationFrame(() => {
              const y = window.scrollY;
              setScrolled(y > 50);
              if (y > lastY.current && y > 100) {
                setHidden(true);   // scroll down → cache
              } else {
                setHidden(false);  // scroll up  → montre
              }
              lastY.current = y <= 0 ? 0 : y;
              ticking = false;
            });
            ticking = true;
          }
        };
        window.addEventListener('scroll', handler, { passive: true });
        return () => window.removeEventListener('scroll', handler);
      }, []);

      return { scrolled, hidden };
    }

    // ── Hook : IntersectionObserver pour reveal au scroll ────────────────────────
    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1, rootMargin: '0px 0px -80px 0px' });
        els.forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
    }

                    Me contacter <span>→</span>
                  </a>
                  {/* ✏️ Ajoute/change les boutons ici si besoin */}
                </div>
              </div>

              {/* ─ Fausse fenêtre de code ─ */}
              <div className="lg:block">
                <div className="glass rounded-2xl overflow-hidden border border-white/10 shadow-2xl shadow-brand-500/10"
                  style={{ fontFamily: 'JetBrains Mono, monospace' }}>

                  {/* Barre de titre de l'éditeur */}
                  <div className="flex items-center justify-between px-4 py-3 bg-white/5 border-b border-white/5">
                    <div className="flex items-center gap-3">
                      {/* Dots macOS */}
                      <div className="flex gap-1.5">
                        <div className="w-3 h-3 rounded-full bg-red-500/80"></div>
                        <div className="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                        <div className="w-3 h-3 rounded-full bg-green-500/80"></div>
                      </div>
                      <div className="flex items-center gap-1.5 px-3 py-1 rounded-md bg-white/5 border border-white/10">
                        <span className="text-yellow-400 text-xs">JS</span>
                        <span className="text-gray-400 text-xs">developer.js</span>
                      </div>
                    </div>
                    <div className="flex gap-3 text-gray-600 text-xs">
                      <span>—</span><span>⬜</span><span>✕</span>
                    </div>
                  </div>

                  {/* Contenu du code */}
                  <div className="p-5 text-sm leading-7">
                    {codeLines.map(line => (
                      <div key={line.num} className="flex gap-4">
                        <span className="text-gray-700 select-none w-4 text-right flex-shrink-0">{line.num}</span>
                        <span className="text-gray-300">{line.content}</span>
                      </div>
                    ))}
                  </div>

                  {/* Barre de statut */}
                  <div className="flex items-center justify-between px-4 py-2 bg-brand-500/10 border-t border-white/5 text-xs text-gray-500">
                    <span className="flex items-center gap-1.5">
                      <span className="w-2 h-2 rounded-full bg-emerald-400"></span> Node.js 20
                    </span>
                    <span>UTF-8</span>
                    <span>JavaScript</span>
                  </div>
                </div>
              </div>

            </div>
          </div>

          {/* Dégradé bas */}
          <div className="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-gray-950 to-transparent pointer-events-none"></div>
        </section>
      );
    }

    // ── Composant : Projets ───────────────────────────────────────────────────────
    function Projects() {
      // Tilt 3D au hover pour les projets featured
      const handleMouseMove = (e, card) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const cx = rect.width / 2;
        const cy = rect.height / 2;
        const rx = (y - cy) / 12;
        const ry = (cx - x) / 12;
        card.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-6px)`;
      };
      const handleMouseLeave = (card) => { card.style.transform = ''; };

      return (
        <section id="projects" className="py-24 bg-gray-950">
          <div className="max-w-6xl mx-auto px-4">
            <div className="text-center mb-14 reveal">
              <span className="inline-block px-3 py-1 rounded-full bg-brand-500/10 text-brand-400 text-xs font-bold uppercase tracking-widest mb-4 border border-brand-500/20">PROJETS</span>
              <h2 className="text-4xl sm:text-5xl font-black text-white mb-3">Ce que j'ai créé</h2>
              <p className="text-gray-400 text-lg">Quelques projets qui représentent mon travail</p>
              {/* ✏️ Change le titre et la description de la section ici */}
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-3xl mx-auto">
              {PROJECTS.map((p, i) => (
                <div key={i}
                  className={`project-card glass rounded-2xl p-6 bg-gradient-to-br ${p.color} border ${p.border} flex flex-col gap-4 cursor-default reveal ${p.featured ? 'md:col-span-2 md:w-3/4 md:mx-auto lg:w-full lg:col-span-1' : ''}`}
                  style={{ animationDelay: `${i * 0.1}s` }}
                  onMouseMove={e => handleMouseMove(e, e.currentTarget)}
                  onMouseLeave={e => handleMouseLeave(e.currentTarget)}>
                  <div className="text-4xl">{p.emoji}</div>
                  <div>
                    <h3 className="text-xl font-bold text-white mb-1">{p.title}</h3>
                    <p className="text-gray-400 text-sm leading-relaxed">{p.desc}</p>
                  </div>
                  <div className="flex flex-wrap gap-2 mt-auto">
                    {p.tags.map(t => (
                      <span key={t} className="px-2 py-0.5 rounded-lg bg-white/5 border border-white/10 text-gray-400 text-xs font-mono">{t}</span>
                    ))}
                  </div>
                  {p.link !== "#" && (
                    <a href={p.link} target="_blank" rel="noopener"
                      className="inline-flex items-center gap-1 text-brand-300 text-sm font-semibold hover:text-brand-200 transition-colors">
                      {p.linkLabel}
                    </a>
                  )}
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ── Composant : Skills ────────────────────────────────────────────────────────
    function Skills() {
      const categories = [...new Set(SKILLS.map(s => s.category))];

      return (
        <section id="skills" className="py-24 bg-gray-900/30">
          <div className="max-w-6xl mx-auto px-4">
            <div className="text-center mb-14 reveal">
              <span className="inline-block px-3 py-1 rounded-full bg-indigo-500/10 text-indigo-400 text-xs font-bold uppercase tracking-widest mb-4 border border-indigo-500/20">COMPÉTENCES</span>
              <h2 className="text-4xl sm:text-5xl font-black text-white mb-3">Ma stack technique</h2>
              <p className="text-gray-400 text-lg">Les outils avec lesquels je travaille</p>
              {/* ✏️ Change le titre et la description ici */}
            </div>

            {categories.map(cat => {
              const catSkills = SKILLS.filter(s => s.category === cat);
              return (
                <div key={cat} className="mb-10 reveal">
                  <h3 className="text-center text-sm font-bold uppercase tracking-widest text-gray-500 mb-6 flex items-center justify-center gap-3">
                    <span className="flex-1 h-px bg-white/5"></span>
                    {cat}
                    <span className="flex-1 h-px bg-white/5"></span>
                  </h3>
                  <div className="flex flex-wrap justify-center gap-4">
                    {catSkills.map((skill, i) => (
                      <div key={i}
                        className="skill-card glass rounded-2xl p-4 border border-white/8 flex flex-col items-center justify-center gap-2 cursor-default"
                        style={{ width: '110px', height: '120px' }}>
                        <div className="skill-icon w-14 h-14 rounded-xl bg-white/5 flex items-center justify-center border border-white/5 p-2">
                          {skill.icon.startsWith('http') ? (
                            <img src={skill.icon} alt={skill.name}
                              className="w-full h-full object-contain"
                              onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }}
                            />
                          ) : (
                            <span className="text-3xl">{skill.icon}</span>
                          )}
                          {/* ✏️ Si tu veux utiliser un emoji à la place d'une image :
                           remplace icon: "https://..." par icon: "🐍" (par exemple)
                           et le rendu passera automatiquement en emoji */}
                        </div>
                        <span className="text-xs font-semibold text-gray-400 text-center truncate w-full text-center">{skill.name}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      );
    }

    // ── Composant : Contact ───────────────────────────────────────────────────────
    function Contact() {
      return (
        <section id="contact" className="py-24 bg-gray-950">
          <div className="max-w-5xl mx-auto px-4">
            <div className="text-center mb-14 reveal">
              <span className="inline-block px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-bold uppercase tracking-widest mb-4 border border-emerald-500/20">CONTACT</span>
              <h2 className="text-4xl sm:text-5xl font-black text-white mb-3">Où me trouver ?</h2>
              <p className="text-gray-400 text-lg">N'hésite pas à me contacter !</p>
              {/* ✏️ Change le titre et la description ici */}
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-3 gap-5">
              {CONTACTS.map((c, i) => (
                <a key={i} href={c.href} target={c.href.startsWith('http') ? '_blank' : '_self'} rel="noopener"
                  className={`contact-card glass rounded-2xl p-8 text-center flex flex-col items-center gap-4 no-underline border ${c.border} bg-gradient-to-br ${c.color} reveal`}
                  style={{ animationDelay: `${i * 0.1}s` }}>
                  <div className="contact-icon w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-600 flex items-center justify-center text-3xl shadow-lg shadow-brand-500/30">
                    {c.icon}
                  </div>
                  <div>
                    <h3 className="text-lg font-bold text-white">{c.title}</h3>
                    <p className="text-gray-400 text-sm">{c.subtitle}</p>
                  </div>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ── Composant : Footer ────────────────────────────────────────────────────────
    function Footer() {
      return (
        <footer className="bg-black border-t border-white/5 py-10">
          <div className="max-w-6xl mx-auto px-4">
            <div className="flex flex-col sm:flex-row justify-between items-center gap-6 mb-8">
              <div className="flex items-center gap-2">
                <div className="w-7 h-7 rounded-lg bg-gradient-to-br from-brand-500 to-brand-600 flex items-center justify-center text-xs font-black">K</div>
                <span className="font-bold">{ME.name}</span>
              </div>
              <div className="flex items-center gap-4 text-sm text-gray-500">

              </div>
            </div>
            {/* Ligne séparatrice orange/violet style Kurama */}
            <div className="h-px mb-6" style={{ background: 'linear-gradient(90deg, transparent 0%, rgba(123,104,238,0.4) 50%, transparent 100%)' }}></div>
            <div className="flex flex-col sm:flex-row justify-between items-center gap-2 text-xs text-gray-600">
              <p>© 2026 {ME.name}. Tous droits réservés.</p>
              <p>Made by {ME.name}</p>
            </div>
          </div>
        </footer>
      );
    }

    // ── App racine ────────────────────────────────────────────────────────────────
    function App() {
      useReveal(); // active les animations au scroll pour toute la page

      return (
        <>
          <Navbar />
          <Hero />
          <Projects />
          <Skills />
          <Contact />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
